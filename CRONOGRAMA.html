<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Cronograma</title>

  <!-- Fonte Poppins + Bebas Neue (para VS) -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  
  <!-- Font Awesome -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- CSS do menu (com animações) -->
  <link rel="stylesheet" href="menu.css">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #0f0f0f !important;
      padding-top: 4rem;
      margin: 0;
      display: flex;
      justify-content: center;
    }

    @media (max-width: 768px) {
      body {
        padding-top: 6.5rem;
      }
    }

    .wrapper {
      width: 100%;
      max-width: 1000px;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      opacity: 0;
      animation: fadeInUp 0.8s ease-out forwards;
      padding: 0 20px;
    }

    .container h1 {
      text-align: center;
      font-size: clamp(1.5rem, 6vw, 2.5rem);
      margin-bottom: 1.5rem;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container h1 i {
      margin-right: 0.5rem;
      font-size: 1em;
      color: #00bcd4;
    }

    .card-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      width: 100%;
      margin: 0 auto;
      padding-bottom: 20px;
    }

    .card {
      background: rgba(40,40,40,0.85);
      border: 1px solid rgba(0,188,212,0.6);
      backdrop-filter: blur(12px);
      border-radius: 14px;
      padding: 20px;
      flex: 1 1 300px;
      max-width: 350px;
      box-shadow: none;
      animation: fadeIn 0.8s ease;
      transition: transform 0.3s ease;
    }

    .card:hover,
    .card:active {
      transform: scale(1.03);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .event-title {
      font-size: 1.1rem;
      color: #fff;
      font-weight: bold;
      text-align: center;
      margin-bottom: 15px;
      white-space: nowrap;
    }

    .players {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .player {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .player > div {
      white-space: nowrap;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      margin-top: 8px;
      text-shadow: 0 0 5px rgba(255,255,255,0.3);
    }

    .avatar {
      width: 94.5px;
      height: 94.5px;
      border-radius: 50%;
      border: 1.5px solid #00bcd4;
      object-fit: cover;
      transition: border 0.3s ease;
    }

    .vs {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      font-weight: normal;
      white-space: nowrap;
      color: #ff4444;
      text-shadow: 0 0 4px rgba(255, 68, 68, 0.5);
    }

    @media (max-width: 768px) {
      .card {
        flex: 1 1 100%;
        max-width: 100%;
      }
      .avatar {
        width: 85.5px;
        height: 85.5px;
      }
    }
  </style>
</head>
<body>

  <!-- Menu carregado dinamicamente -->
<div id="menu-placeholder"></div>
<script>
  fetch('menu.html')
    .then(res => res.text())
    .then(html => {
      const parser = new DOMParser();
      const doc    = parser.parseFromString(html, 'text/html');
      // injeta apenas o <nav> (o CSS já veio no menu.css)
      const nav = doc.querySelector('nav.navbar');
      document.getElementById('menu-placeholder').appendChild(nav);
      // ajusta o padding-top conforme a altura real do navbar
      const ajustarPadding = () => {
        document.body.style.paddingTop = nav.offsetHeight + 'px';
      };
      ajustarPadding();
      window.addEventListener('resize', ajustarPadding);
    })
    .catch(console.error);
</script>

  <div class="wrapper">
    <div class="container">
      <h1><i class="fas fa-calendar-days"></i>Próximos confrontos</h1>
      <div class="card-container">
        <div class="card">
          <div class="event-title">12 de Abril - 19:00 (Segunda-Feira)</div>
          <div class="players">
            <div class="player">
              <img class="avatar" src="https://randomuser.me/api/portraits/men/32.jpg" alt="Ericles">
              <div>Ericles</div>
            </div>
            <div class="vs">VS</div>
            <div class="player">
              <img class="avatar" src="https://randomuser.me/api/portraits/women/44.jpg" alt="Wagner">
              <div>Wagner</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="event-title">13 de Abril - 14:00 (Terça-Feira)</div>
          <div class="players">
            <div class="player">
              <img class="avatar" src="https://randomuser.me/api/portraits/men/15.jpg" alt="Samuel">
              <div>Samuel</div>
            </div>
            <div class="vs">VS</div>
            <div class="player">
              <img class="avatar" src="https://randomuser.me/api/portraits/women/25.jpg" alt="Fernando">
              <div>Fernando</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="event-title">14 de Abril - 16:00 (Quarta-Feira)</div>
          <div class="players">
            <div class="player">
              <img class="avatar" src="https://randomuser.me/api/portraits/men/45.jpg" alt="Vinicius">
              <div>Vinicius</div>
            </div>
            <div class="vs">VS</div>
            <div class="player">
              <img class="avatar" src="https://randomuser.me/api/portraits/women/33.jpg" alt="Michel">
              <div>Michel</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="event-title">15 de Abril - 18:00 (Quinta-Feira)</div>
          <div class="players">
            <div class="player">
              <img class="avatar" src="https://randomuser.me/api/portraits/men/27.jpg" alt="Douglas">
              <div>Douglas</div>
            </div>
            <div class="vs">VS</div>
            <div class="player">
              <img class="avatar" src="https://randomuser.me/api/portraits/women/18.jpg" alt="Danilo">
              <div>Danilo</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
