<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      background-color: transparent;
      font-family: 'Segoe UI', sans-serif;
      color: #f1f1f1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
      margin: 0;
    }

    .card-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;   /* centraliza os cards */
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding-top: 0;
    }

    .card {
      background-color: transparent;
      border: 1px solid #444;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      width: auto;
      min-width: 300px;
      max-width: 350px;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
      animation: fadeIn 0.8s ease;
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    /* Aproximação dos jogadores ao “Vs” */
    .players {
      display: flex;
      justify-content: center;   /* centraliza o conjunto */
      align-items: center;
      width: 100%;
      gap: 10px;                 /* gap reduzido para aproximar */
    }

    .player {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      position: relative;
    }

    /* Avatar 50% maior (70→105) menos 10% → 94.5px */
    .avatar {
      width: 94.5px;
      height: 94.5px;
      border-radius: 50%;
      border: 3px solid #666;
      background-color: #1a1a1a;
      object-fit: cover;
      transition: border 0.3s ease;
    }

    .card:hover .avatar {
      border-color: #999;
    }

    /* “Vs” 50% maior (1.2rem→1.8rem) menos 10% → 1.62rem */
    .vs {
      font-size: 1.62rem;
      font-weight: bold;
      margin: 0 5px;
    }

    .ranking-index {
      position: absolute;
      top: -10px;
      right: -10px;
      background-color: rgba(0, 0, 0, 0.6);
      color: #fff;
      padding: 3px 6px;
      border-radius: 50%;
      font-size: 0.5rem;
      font-weight: bold;
      animation: none;
    }

    .ranking-index.rank-1 {
      border: 3px solid #28a745;
      color: #ffd700;
      animation: blinkGreen 2s infinite;
    }

    .ranking-index.rank-20 {
      border: 3px solid #dc3545;
      color: #8b0000;
      animation: blinkRed 2s infinite;
    }

    @keyframes blinkGreen {
      0% { border-color: #28a745; }
      50% { border-color: transparent; }
      100% { border-color: #28a745; }
    }
    @keyframes blinkRed {
      0% { border-color: #dc3545; }
      50% { border-color: transparent; }
      100% { border-color: #dc3545; }
    }

    .event-title {
      font-size: 1.1rem;
      color: #fff;
      font-weight: bold;
      text-align: center;
      margin-bottom: 15px;
    }

    /* Nome do jogador 50% maior (1rem→1.5rem) menos 10% → 1.35rem */
    .player div {
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
      width: 100%;
      display: block;
      font-size: 1.35rem;
      text-align: center;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .card {
        width: 100%;
        height: auto;
      }
      .players {
        flex-direction: row;
        justify-content: center;  /* mantém centralização no mobile */
        align-items: center;
        gap: 10px;                /* mantém proximidade */
      }
      .avatar {
        width: 85.5px;            /* 90px menos 10% → 81px, mas original mobile was 90, so: 90*0.9=81 */
        height: 85.5px;          /* porém mantendo 10% reduction from desktop: 94.5→85.05 arredondei para 85.5 */
      }
      .vs {
        font-size: 1.62rem;
      }
      .player div {
        font-size: 1.35rem;
      }
    }

    @media (max-width: 480px) {
      .avatar {
        width: 85.5px;
        height: 85.5px;
      }
      .vs {
        font-size: 1.62rem;
      }
      .player div {
        font-size: 1.35rem;
      }
    }
  </style>
</head>
<body>
