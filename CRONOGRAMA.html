<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Placar de Partidas</title>

  <!-- Fonte Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />

  <!-- Font Awesome para os ícones do menu e título -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="menu.css">

  <!-- ===== container + título estilo ANIMADO ===== -->
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #0f0f0f !important;
      padding-top: 4rem;
      margin: 0;
      display: flex;
      justify-content: center;
    }

    @media (max-width: 768px) {
      body {
        padding-top: 6.5rem;
      }
    }

    .wrapper {
      width: 100%;
      max-width: 1000px;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      opacity: 0;
      animation: fadeInUp 0.8s ease-out forwards;
      padding: 0 20px;
      /* REMOVIDO overflow-x */
    }
    .container h1 {
      text-align: center;
      /* font-size responsivo: mínimo 1.5rem, ideal 6vw, máximo 2.5rem */
      font-size: clamp(1.5rem, 6vw, 2.5rem);
      margin-bottom: 1.5rem;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      /* REMOVIDO white-space e min-width */
    }
    .container h1 i {
      margin-right: 0.5rem;
      /* ícone acompanha escala do texto */
      font-size: 1em;
      color: #00bcd4;
    }
  </style>

  <!-- ===== CSS EXISTENTE DO CARD-CONTAINER ===== -->
  <style>
    .card-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      width: 100%;
      margin: 0 auto;
      padding-bottom: 20px;
    }
    .card {
      background: rgba(40,40,40,0.85);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border-radius: 14px;
      padding: 20px;
      flex: 1 1 300px;
      max-width: 350px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      animation: fadeIn 0.8s ease;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card:hover {
      border-color: rgba(0,188,212,0.6);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
    }
    .card:active {
      border-color: rgba(0,188,212,0.6);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
    }
    .event-title {
      font-size: 1.1rem;
      color: #fff;
      font-weight: bold;
      text-align: center;
      margin-bottom: 15px;
      white-space: nowrap;
    }
    .players {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }
    .player {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    .player > div {
      white-space: nowrap;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      margin-top: 8px;
      text-shadow: 0 0 5px rgba(255,255,255,0.3);
    }
    .avatar {
      width: 94.5px;
      height: 94.5px;
      border-radius: 50%;
      border: 3px solid #666;
      object-fit: cover;
      transition: border 0.3s ease;
    }
    .card:hover .avatar {
      border-color: #00bcd4;
    }
    .vs {
      font-size: 1.62rem;
      font-weight: bold;
      white-space: nowrap;
    }
    .ranking-index {
      position: absolute;
      top: -10px;
      right: -10px;
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 3px 6px;
      border-radius: 50%;
      font-size: .5rem;
      font-weight: bold;
    }
    .ranking-index.rank-1 {
      border: 3px solid #28a745;
      color: #ffd700;
      animation: blinkGreen 2s infinite;
    }
    .ranking-index.rank-20 {
      border: 3px solid #dc3545;
      color: #8b0000;
      animation: blinkRed 2s infinite;
    }
    @keyframes blinkGreen {
      0%,100% { border-color: #28a745; }
      50%     { border-color: transparent; }
    }
    @keyframes blinkRed {
      0%,100% { border-color: #dc3545; }
      50%     { border-color: transparent; }
    }
    @media (max-width: 768px) {
      .card {
        flex: 1 1 100%;
        max-width: 100%;
      }
      .avatar {
        width: 85.5px;
        height: 85.5px;
      }
    }
  </style>
</head>
<body>

  <!-- Menu carregado dinamicamente -->
  <div id="menu-placeholder"></div>
  <script>
    fetch('menu.html')
      .then(res => res.text())
      .then(html => {
        const parser = new DOMParser();
        const doc    = parser.parseFromString(html, 'text/html');
        const nav    = doc.querySelector('nav.navbar');
        document.getElementById('menu-placeholder').appendChild(nav);
        document.body.style.paddingTop = nav.offsetHeight + 'px';
        window.addEventListener('resize', () => {
          document.body.style.paddingTop = nav.offsetHeight + 'px';
        });
      });
  </script>

  <div class="wrapper">
    <div class="container">
      <h1><i class="fas fa-calendar-days"></i>Próximos confrontos</h1>
      <div class="card-container">
        <div class="card">
          <div class="event-title">12 de Abril - 19:00 (Segunda-Feira)</div>
          <div class="players">
            <div class="player">
              <span class="ranking-index rank-1">1</span>
              <img class="avatar" src="https://randomuser.me/api/portraits/men/32.jpg" alt="Ericles">
              <div>Ericles</div>
            </div>
            <div class="vs">Vs</div>
            <div class="player">
              <span class="ranking-index">12</span>
              <img class="avatar" src="https://randomuser.me/api/portraits/women/44.jpg" alt="Wagner">
              <div>Wagner</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="event-title">13 de Abril - 14:00 (Terça-Feira)</div>
          <div class="players">
            <div class="player">
              <span class="ranking-index">18</span>
              <img class="avatar" src="https://randomuser.me/api/portraits/men/15.jpg" alt="Samuel">
              <div>Samuel</div>
            </div>
            <div class="vs">Vs</div>
            <div class="player">
              <span class="ranking-index">8</span>
              <img class="avatar" src="https://randomuser.me/api/portraits/women/25.jpg" alt="Fernando">
              <div>Fernando</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="event-title">14 de Abril - 16:00 (Quarta-Feira)</div>
          <div class="players">
            <div class="player">
              <span class="ranking-index rank-1">1</span>
              <img class="avatar" src="https://randomuser.me/api/portraits/men/45.jpg" alt="Vinicius">
              <div>Vinicius</div>
            </div>
            <div class="vs">Vs</div>
            <div class="player">
              <span class="ranking-index">15</span>
              <img class="avatar" src="https://randomuser.me/api/portraits/women/33.jpg" alt="Michel">
              <div>Michel</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="event-title">15 de Abril - 18:00 (Quinta-Feira)</div>
          <div class="players">
            <div class="player">
              <span class="ranking-index">10</span>
              <img class="avatar" src="https://randomuser.me/api/portraits/men/27.jpg" alt="Douglas">
              <div>Douglas</div>
            </div>
            <div class="vs">Vs</div>
            <div class="player">
              <span class="ranking-index rank-20">20</span>
              <img class="avatar" src="https://randomuser.me/api/portraits/women/18.jpg" alt="Danilo">
              <div>Danilo</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
