<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Menu de Navegação</title>

  <!-- Fonte Poppins -->
  <link 
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" 
    rel="stylesheet" 
  />

  <!-- Font Awesome para ícones -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <!-- CSS do Menu -->
  <link rel="stylesheet" href="menu.css"/>
</head>
<body>
  <nav class="navbar" role="navigation" aria-label="Menu de navegação principal">
    <a href="tabela.html" title="Visualizar a Tabela">
      <i class="fas fa-table"></i> Tabela
    </a>
    <a href="resultados.html" title="Visualizar Resultados">
      <i class="fas fa-chart-line"></i> Resultados
    </a>
    <a href="cronograma.html" title="Visualizar Cronograma">
      <i class="fas fa-calendar-alt"></i> Cronograma
    </a>
    <a href="regulamento.html" title="Visualizar Regulamento">
      <i class="fas fa-scroll"></i> Regulamento
    </a>

    <!-- 🔗 Botão: Perfil -->
    <a href="#" class="btn-profile" id="profile-toggle" title="Meu Perfil">
      <i class="fas fa-user-circle"></i>
    </a>

    <!-- Submenu de Perfil (inicialmente vazio) -->
    <div class="profile-menu" id="profile-menu"></div>
  </nav>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const toggle = document.getElementById('profile-toggle');
      const menu   = document.getElementById('profile-menu');

      // **1) define se o usuário está logado**
      // Por exemplo, você pode vir de um cookie, localStorage ou variável global
      const isLoggedIn = window.isLoggedIn === true;

      // **2) monta as opções** conforme o estado
      const items = isLoggedIn
        ? [
            { text: 'Perfil',       href: 'perfil.html' },
            { text: 'Configurações', href: 'configuracoes.html' },
            { text: 'Sair',         href: 'sair.html' }
          ]
        : [
            { text: 'Entrar',       href: 'login.html' }
          ];

      // **3) popula o submenu**
      menu.innerHTML = '';  // limpa
      items.forEach(item => {
        const a = document.createElement('a');
        a.href = item.href;
        a.textContent = item.text;
        menu.appendChild(a);
      });

      // **4) toggle de exibição**
      toggle.addEventListener('click', e => {
        e.preventDefault();
        menu.classList.toggle('show');
      });

      // **5) fechar ao clicar fora**
      document.addEventListener('click', e => {
        if (!toggle.contains(e.target) && !menu.contains(e.target)) {
          menu.classList.remove('show');
        }
      });
    });
  </script>
</body>
</html>
