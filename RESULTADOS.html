<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Resultados</title>
  <!-- Fonte do menu -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    /* === MENU AJUSTADO SEM MARGEM/PADDING ACIMA === */
    body {
      margin: 0;
      padding: 0;
      background: #0f0f0f;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .navbar {
      position: sticky;
      top: 0;
      width: 100%;
      background: #0f0f0f;
      height: 60px;
      padding: 0 1rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    .navbar a {
      color: #ccc;
      text-decoration: none;
      font-size: 1rem;
      font-family: 'Poppins', sans-serif;
      line-height: 60px;
      transition: color .3s;
    }
    .navbar a:hover {
      color: #00bcd4;
    }

    /* === SCOREBOARD CSS ORIGINAL === */
    * {
      box-sizing: border-box;
    }
    .scoreboard {
      background: rgba(30, 30, 30, 0.6);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 20px 30px;
      max-width: 700px;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      column-gap: 40px;
      overflow-x: auto;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
      transition: transform 0.3s ease, opacity 0.5s ease;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInUp 0.8s forwards;
    }
    .scoreboard::-webkit-scrollbar {
      height: 6px;
    }
    .scoreboard::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.3);
      border-radius: 3px;
    }
    .scoreboard:nth-child(1) { animation-delay: 0.2s; }
    .scoreboard:nth-child(2) { animation-delay: 0.4s; }
    .scoreboard:nth-child(3) { animation-delay: 0.6s; }
    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .team-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 80px;
    }
    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 10px;
      border: 4px solid transparent;
      transition: transform 0.3s;
    }
    .avatar:hover {
      transform: scale(1.05);
    }
    .winner { border-color: #00ff88 !important; }
    .loser  { border-color: #ff4444 !important; }
    .draw   { border-color: #888     !important; }
    .team-name {
      color: #eee;
      font-weight: bold;
      font-size: 1.1rem;
      white-space: nowrap;
      text-align: center;
    }
    .middle {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      min-width: 80px;
    }
    .scores {
      display: flex;
      gap: 30px;
      align-items: center;
    }
    .score {
      font-size: 2.8rem;
      font-weight: bold;
      color: #fff;
      white-space: nowrap;
    }
    .score.winner {
      color: #00ff88;
      text-shadow: 0 0 10px rgba(0,255,136,0.6);
    }
    .score.loser {
      color: #ff4444;
      text-shadow: 0 0 10px rgba(255,68,68,0.6);
    }
    .score.draw {
      color: #888;
      text-shadow: 0 0 8px rgba(136,136,136,0.5);
    }
    .vs {
      font-size: 1.3rem;
      font-weight: bold;
      color: #ccc;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="TABELA.html">📊 Tabela</a>
    <a href="RESULTADOS.html">📈 Resultados</a>
    <a href="CRONOGRAMA.html">📅 Cronograma</a>
    <a href="RANKING.html">🏆 Ranking</a>
    <a href="NOTICIAS.html">📰 Notícias</a>
    <a href="REGULAMENTO.html">📜 Regulamento</a>
  </nav>

  <!-- Scoreboards -->
  <div class="scoreboard" data-team1-score="2" data-team2-score="1">
    <div class="team-block team1">
      <img class="avatar" src="Samito.png" alt="Samuel">
      <div class="team-name">Samuel</div>
    </div>
    <div class="middle">
      <div class="scores">
        <div class="score team1-score">2</div>
        <div class="vs">VS</div>
        <div class="score team2-score">1</div>
      </div>
    </div>
    <div class="team-block team2">
      <img class="avatar" src="https://randomuser.me/api/portraits/men/20.jpg" alt="Vinicius">
      <div class="team-name">Vinicius</div>
    </div>
  </div>

  <div class="scoreboard" data-team1-score="3" data-team2-score="4">
    <div class="team-block team1">
      <img class="avatar" src="https://randomuser.me/api/portraits/men/21.jpg" alt="Fernando">
      <div class="team-name">Fernando</div>
    </div>
    <div class="middle">
      <div class="scores">
        <div class="score team1-score">3</div>
        <div class="vs">VS</div>
        <div class="score team2-score">4</div>
      </div>
    </div>
    <div class="team-block team2">
      <img class="avatar" src="https://randomuser.me/api/portraits/men/22.jpg" alt="Douglas">
      <div class="team-name">Douglas</div>
    </div>
  </div>

  <div class="scoreboard" data-team1-score="1" data-team2-score="1">
    <div class="team-block team1">
      <img class="avatar" src="https://randomuser.me/api/portraits/men/23.jpg" alt="Danilo">
      <div class="team-name">Danilo</div>
    </div>
    <div class="middle">
      <div class="scores">
        <div class="score team1-score">1</div>
        <div class="vs">VS</div>
        <div class="score team2-score">1</div>
      </div>
    </div>
    <div class="team-block team2">
      <img class="avatar" src="https://randomuser.me/api/portraits/men/24.jpg" alt="Michel">
      <div class="team-name">Michel</div>
    </div>
  </div>

  <script>
    // Canvas de alta qualidade para o avatar de Samuel
    window.addEventListener('load', () => {
      const img = document.querySelector('img.avatar[src="Samito.png"]');
      if (!img) return;

      const cssW = img.width, cssH = img.height;
      const dpr = window.devicePixelRatio || 1;
      const canvas = document.createElement('canvas');
      canvas.width = cssW * dpr;
      canvas.height = cssH * dpr;
      canvas.style.width = cssW + 'px';
      canvas.style.height = cssH + 'px';
      canvas.className = img.className;

      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, 0, 0, cssW, cssH);

      img.replaceWith(canvas);
    });

    // Marcar winner/loser/draw
    document.querySelectorAll('.scoreboard').forEach(board => {
      const s1 = +board.dataset.team1Score;
      const s2 = +board.dataset.team2Score;
      const a1 = board.querySelector('.team1 .avatar, .team1 canvas');
      const a2 = board.querySelector('.team2 .avatar, .team2 canvas');
      const sc1 = board.querySelector('.team1-score');
      const sc2 = board.querySelector('.team2-score');
      if (s1 > s2) {
        a1.classList.add('winner');  sc1.classList.add('winner');
        a2.classList.add('loser');   sc2.classList.add('loser');
      } else if (s2 > s1) {
        a2.classList.add('winner');  sc2.classList.add('winner');
        a1.classList.add('loser');   sc1.classList.add('loser');
      } else {
        [a1,a2,sc1,sc2].forEach(el => el.classList.add('draw'));
      }
    });
  </script>
</body>
</html>
