<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Resultados</title>

  <!-- Fonte Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"/>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="menu.css">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #0f0f0f !important;
      padding-top: 4rem;
      margin: 0;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 20px 40px;
      animation: fadeInUp 0.8s ease-out forwards;
    }

    .container h1 {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.5rem, 6vw, 2.5rem);
      color: #fff;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .container h1 i {
      margin-right: 0.5rem;
      font-size: 1em;
      color: #00bcd4;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    @media(max-width: 600px) {
      .score-grid {
        grid-template-columns: 1fr;
      }
    }

    .scoreboard {
      display: table;
      width: 100%;
      background: rgba(40,40,40,0.85);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px 0;
    }

    .team-block,
    .middle {
      display: table-cell;
      vertical-align: middle;
      text-align: center;
      padding: 0 20px;
      white-space: nowrap;
    }

    .team-block { width: 1%; }
    .middle    { width: auto; }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid transparent;
      margin-bottom: 10px;
      transition: transform .3s, border-color .3s;
    }

    .avatar:hover {
      transform: scale(1.05);
    }

    .team-name {
      color: #eee;
      font-weight: bold;
      font-size: 1.1rem;
      margin-top: .5rem;
    }

    .scores {
      display: inline-flex;
      align-items: center;
      gap: 30px;
      font-size: 2.8rem;
      color: #fff;
    }

    .vs {
      font-size: 1.3rem;
      color: #ccc;
      font-weight: bold;
    }

    .winner { border-color: #0f0 !important; }
    .loser  { border-color: #f00 !important; }
    .draw   { border-color: #888 !important; }

    .score.winner { color: #0f0; text-shadow: 0 0 8px #0f0; }
    .score.loser  { color: #f00; text-shadow: 0 0 8px #f00; }
    .score.draw   { color: #888; }

    @media(max-width: 600px) {
      .scoreboard {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 16px;
      }

      .team-block, .middle {
        display: block;
        width: 100%;
        padding: 0;
        margin-bottom: 10px;
      }

      .avatar {
        width: 80px;
        height: 80px;
      }

      .scores {
        font-size: 2.2rem;
        gap: 12px;
      }

      .vs {
        font-size: 1rem;
      }

      .team-name {
        font-size: 1rem;
        white-space: normal;
      }
    }
  </style>
</head>
<body>

  <div id="menu-placeholder"></div>
  <script>
    fetch('menu.html')
      .then(r => r.text())
      .then(html => {
        const d = new DOMParser().parseFromString(html, 'text/html');
        document.getElementById('menu-placeholder')
                .appendChild(d.querySelector('nav.navbar').cloneNode(true));
      });
  </script>

  <div class="container">
    <h1><i class="fas fa-check-circle"></i> Partidas finalizadas</h1>

    <div class="score-grid">
      <div class="scoreboard" data-team1-score="2" data-team2-score="1">
        <div class="team-block team1">
          <img class="avatar" src="Samito.png" alt="Samuel">
          <div class="team-name">Samuel</div>
        </div>
        <div class="middle">
          <div class="scores">
            <div class="score team1-score">2</div>
            <div class="vs">VS</div>
            <div class="score team2-score">1</div>
          </div>
        </div>
        <div class="team-block team2">
          <img class="avatar" src="https://randomuser.me/api/portraits/men/20.jpg" alt="Vinicius">
          <div class="team-name">Vinicius</div>
        </div>
      </div>

      <div class="scoreboard" data-team1-score="3" data-team2-score="4">
        <div class="team-block team1">
          <img class="avatar" src="https://randomuser.me/api/portraits/men/21.jpg" alt="Fernando">
          <div class="team-name">Fernando</div>
        </div>
        <div class="middle">
          <div class="scores">
            <div class="score team1-score">3</div>
            <div class="vs">VS</div>
            <div class="score team2-score">4</div>
          </div>
        </div>
        <div class="team-block team2">
          <img class="avatar" src="https://randomuser.me/api/portraits/men/22.jpg" alt="Douglas">
          <div class="team-name">Douglas</div>
        </div>
      </div>

      <div class="scoreboard" data-team1-score="1" data-team2-score="1">
        <div class="team-block team1">
          <img class="avatar" src="https://randomuser.me/api/portraits/men/23.jpg" alt="Danilo">
          <div class="team-name">Danilo</div>
        </div>
        <div class="middle">
          <div class="scores">
            <div class="score team1-score">1</div>
            <div class="vs">VS</div>
            <div class="score team2-score">1</div>
          </div>
        </div>
        <div class="team-block team2">
          <img class="avatar" src="https://randomuser.me/api/portraits/men/24.jpg" alt="Michel">
          <div class="team-name">Michel</div>
        </div>
      </div>

      <div class="scoreboard" data-team1-score="3" data-team2-score="1">
        <div class="team-block team1">
          <img class="avatar" src="https://randomuser.me/api/portraits/men/23.jpg" alt="Ericles">
          <div class="team-name">Ericles</div>
        </div>
        <div class="middle">
          <div class="scores">
            <div class="score team1-score">3</div>
            <div class="vs">VS</div>
            <div class="score team2-score">1</div>
          </div>
        </div>
        <div class="team-block team2">
          <img class="avatar" src="https://randomuser.me/api/portraits/men/24.jpg" alt="Douglas">
          <div class="team-name">Douglas</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Canvas de alta qualidade para o avatar de Samuel
    window.addEventListener('load', () => {
      const img = document.querySelector('img.avatar[src="Samito.png"]');
      if (!img) return;
      const cssW = img.width, cssH = img.height;
      const dpr = window.devicePixelRatio || 1;
      const canvas = document.createElement('canvas');
      canvas.width = cssW * dpr;
      canvas.height = cssH * dpr;
      canvas.style.width = cssW + 'px';
      canvas.style.height = cssH + 'px';
      canvas.className = img.className;
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, 0, 0, cssW, cssH);
      img.replaceWith(canvas);
    });

    // Marcar winner/loser/draw
    document.querySelectorAll('.scoreboard').forEach(board => {
      const s1 = +board.dataset.team1Score;
      const s2 = +board.dataset.team2Score;
      const a1 = board.querySelector('.team1 .avatar, .team1 canvas');
      const a2 = board.querySelector('.team2 .avatar, .team2 canvas');
      const sc1 = board.querySelector('.team1-score');
      const sc2 = board.querySelector('.team2-score');
      if (s1 > s2) {
        a1.classList.add('winner');
        sc1.classList.add('winner');
        a2.classList.add('loser');
        sc2.classList.add('loser');
      } else if (s2 > s1) {
        a2.classList.add('winner');
        sc2.classList.add('winner');
        a1.classList.add('loser');
        sc1.classList.add('loser');
      } else {
        [a1, a2, sc1, sc2].forEach(el => el.classList.add('draw'));
      }
    });
  </script>
</body>
</html>
