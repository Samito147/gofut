<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Resultados</title>

  <!-- Fonte Poppins -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
    rel="stylesheet"
  />

  <!-- Font Awesome para os ícones do menu e título -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
  <link rel="stylesheet" href="menu.css">

  <!-- ===== título estilo "Regulamento" ===== -->
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #0f0f0f !important;
      padding-top: 4rem;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      opacity: 0;
      animation: fadeInUp 0.8s ease-out forwards;
      padding: 0 20px;
    }
    .container h1 {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin-bottom: 1.5rem;
      color: #ffffff;
    }
    .container h1 i {
      margin-right: 0.5rem;
      font-size: 2.5rem;
      color: #00bcd4;
    }
  </style>

  <!-- === SCOREBOARD CSS === -->
  <style>
    * { box-sizing: border-box; }

    .scoreboard {
      background: rgba(40, 40, 40, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px 30px;
      max-width: 700px;
      width: 100%;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      column-gap: 40px;
      overflow-x: hidden;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInUp 0.8s forwards;
      margin: 0 auto 20px;
    }
    .scoreboard:hover {
      transform: translateY(-10px) scale(1.02);
      border-color: rgba(0,188,212,0.6);
    }
    .scoreboard:active {
      border-color: rgba(0,188,212,0.6);
    }

    /* Ajustes para telas pequenas */
    @media (max-width: 600px) {
      .scoreboard {
        padding: 15px 20px;
        grid-template-columns: auto 1fr auto;
        column-gap: 10px;
      }
      .scores { gap: 10px; }
      .avatar { width: 80px; height: 80px; }
      .score { font-size: 2.2rem; }
      .team-name {
        font-size: 1rem;
        white-space: normal;
      }
      .middle { padding: 0 5px; }
    }

    .team-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      /* permite que encolha se precisar */
      min-width: 0;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 10px;
      border: 4px solid transparent;
      transition: transform 0.3s, border-color 0.3s;
    }
    .avatar:hover { transform: scale(1.05); }

    .team-name {
      color: #eee;
      font-weight: bold;
      font-size: 1.1rem;
      white-space: nowrap;
      text-align: center;
    }

    .middle {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      /* permite encolher para não invadir avatares */
      min-width: 0;
      padding: 0 10px;
    }

    .scores {
      display: flex;
      gap: 30px;
      align-items: center;
    }

    .score {
      font-size: 2.8rem;
      font-weight: bold;
      color: #fff;
      white-space: nowrap;
      transition: text-shadow 0.3s;
    }
    .vs {
      font-size: 1.3rem;
      font-weight: bold;
      color: #ccc;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div id="menu-placeholder"></div>
  <script>
    fetch('menu.html')
      .then(res => res.text())
      .then(html => {
        const doc = new DOMParser().parseFromString(html, 'text/html');
        const nav = doc.querySelector('nav.navbar');
        document.getElementById('menu-placeholder').appendChild(nav);
        document.body.style.paddingTop = nav.offsetHeight + 'px';
        window.addEventListener('resize', () => {
          document.body.style.paddingTop = nav.offsetHeight + 'px';
        });
      });
  </script>

  <div class="container">
    <h1><i class="fas fa-check-circle"></i> Partidas finalizadas</h1>

    <!-- Scoreboards -->
    <div class="scoreboard" data-team1-score="2" data-team2-score="1">
      <div class="team-block team1">
        <img class="avatar" src="Samito.png" alt="Samuel">
        <div class="team-name">Samuel</div>
      </div>
      <div class="middle">
        <div class="scores">
          <div class="score team1-score">2</div>
          <div class="vs">VS</div>
          <div class="score team2-score">1</div>
        </div>
      </div>
      <div class="team-block team2">
        <img class="avatar"
             src="https://randomuser.me/api/portraits/men/20.jpg"
             alt="Vinicius">
        <div class="team-name">Vinicius</div>
      </div>
    </div>

    <div class="scoreboard" data-team1-score="3" data-team2-score="4">
      <div class="team-block team1">
        <img class="avatar"
             src="https://randomuser.me/api/portraits/men/21.jpg"
             alt="Fernando">
        <div class="team-name">Fernando</div>
      </div>
      <div class="middle">
        <div class="scores">
          <div class="score team1-score">3</div>
          <div class="vs">VS</div>
          <div class="score team2-score">4</div>
        </div>
      </div>
      <div class="team-block team2">
        <img class="avatar"
             src="https://randomuser.me/api/portraits/men/22.jpg"
             alt="Douglas">
        <div class="team-name">Douglas</div>
      </div>
    </div>

    <div class="scoreboard" data-team1-score="1" data-team2-score="1">
      <div class="team-block team1">
        <img class="avatar"
             src="https://randomuser.me/api/portraits/men/23.jpg"
             alt="Danilo">
        <div class="team-name">Danilo</div>
      </div>
      <div class="middle">
        <div class="scores">
          <div class="score team1-score">1</div>
          <div class="vs">VS</div>
          <div class="score team2-score">1</div>
        </div>
      </div>
      <div class="team-block team2">
        <img class="avatar"
             src="https://randomuser.me/api/portraits/men/24.jpg"
             alt="Michel">
        <div class="team-name">Michel</div>
      </div>
    </div>
  </div>
</body>
</html>
